pluginManagement {
  // Resolve node at configuration time — Android Studio launched from Dock/Spotlight
  // inherits a minimal launchd PATH that excludes /usr/local/bin and /opt/homebrew/bin.
  // Probe known macOS locations, fall back to a login-shell lookup, store for reuse below.
  def nodeExec = ["/usr/local/bin/node", "/opt/homebrew/bin/node", "/usr/bin/node"]
      .find { new File(it).exists() }
  if (!nodeExec) {
    try {
      def proc = ["/bin/zsh", "-l", "-c", "which node"].execute()
      proc.waitFor()
      def path = proc.text.trim()
      if (path && new File(path).exists()) nodeExec = path
    } catch (ignored) {}
  }
  if (!nodeExec) nodeExec = "node"
  System.setProperty("node.executable", nodeExec)

  def reactNativeGradlePlugin = new File(
    providers.exec {
      workingDir(rootDir)
      commandLine(nodeExec, "--print", "require.resolve('@react-native/gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] })")
    }.standardOutput.asText.get().trim()
  ).getParentFile().absolutePath
  includeBuild(reactNativeGradlePlugin)

  def expoPluginsPath = new File(
    providers.exec {
      workingDir(rootDir)
      commandLine(nodeExec, "--print", "require.resolve('expo-modules-autolinking/package.json', { paths: [require.resolve('expo/package.json')] })")
    }.standardOutput.asText.get().trim(),
    "../android/expo-gradle-plugin"
  ).absolutePath
  includeBuild(expoPluginsPath)
}

plugins {
  id("com.facebook.react.settings")
  id("expo-autolinking-settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
  if (System.getenv('EXPO_USE_COMMUNITY_AUTOLINKING') == '1') {
    ex.autolinkLibrariesFromCommand()
  } else {
    ex.autolinkLibrariesFromCommand(expoAutolinking.rnConfigCommand)
  }
}
expoAutolinking.useExpoModules()

rootProject.name = 'TescoRNApp'

expoAutolinking.useExpoVersionCatalog()

include ':app'
includeBuild(expoAutolinking.reactNativeGradlePlugin)
include ':brownfield'
def brownfieldPluginsPath = new File(
  providers.exec {
    workingDir(rootDir)
    commandLine(System.getProperty("node.executable", "node"), "--print", "require.resolve('expo-brownfield/package.json')")
  }.standardOutput.asText.get().trim(),
  "../gradle-plugins"
).absolutePath
includeBuild(brownfieldPluginsPath)