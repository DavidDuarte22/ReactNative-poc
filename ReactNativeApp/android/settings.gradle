// Resolve the node executable path at configuration time.
// Android Studio (launched from Dock/Spotlight) inherits a minimal launchd PATH that does not
// include /usr/local/bin or /opt/homebrew/bin, so "node" alone is not found.
// We probe known macOS locations and fall back to a login-shell `which node` lookup.
def findNode = {
  for (def candidate in ["/usr/local/bin/node", "/opt/homebrew/bin/node", "/usr/bin/node"]) {
    if (new File(candidate).exists()) return candidate
  }
  try {
    def proc = ["/bin/zsh", "-l", "-c", "which node"].execute()
    proc.waitFor()
    def path = proc.text.trim()
    if (path && new File(path).exists()) return path
  } catch (ignored) {}
  return "node"  // last resort — works if node is already on the daemon's PATH
}
def NODE = findNode()

pluginManagement {
  def reactNativeGradlePlugin = new File(
    providers.exec {
      workingDir(rootDir)
      commandLine(NODE, "--print", "require.resolve('@react-native/gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] })")
    }.standardOutput.asText.get().trim()
  ).getParentFile().absolutePath
  includeBuild(reactNativeGradlePlugin)

  def expoPluginsPath = new File(
    providers.exec {
      workingDir(rootDir)
      commandLine(NODE, "--print", "require.resolve('expo-modules-autolinking/package.json', { paths: [require.resolve('expo/package.json')] })")
    }.standardOutput.asText.get().trim(),
    "../android/expo-gradle-plugin"
  ).absolutePath
  includeBuild(expoPluginsPath)
}

plugins {
  id("com.facebook.react.settings")
  id("expo-autolinking-settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
  if (System.getenv('EXPO_USE_COMMUNITY_AUTOLINKING') == '1') {
    ex.autolinkLibrariesFromCommand()
  } else {
    ex.autolinkLibrariesFromCommand(expoAutolinking.rnConfigCommand)
  }
}
expoAutolinking.useExpoModules()

rootProject.name = 'TescoRNApp'

expoAutolinking.useExpoVersionCatalog()

include ':app'
includeBuild(expoAutolinking.reactNativeGradlePlugin)
include ':brownfield'
def brownfieldPluginsPath = new File(
  providers.exec {
    workingDir(rootDir)
    commandLine(NODE, "--print", "require.resolve('expo-brownfield/package.json')")
  }.standardOutput.asText.get().trim(),
  "../gradle-plugins"
).absolutePath
includeBuild(brownfieldPluginsPath)