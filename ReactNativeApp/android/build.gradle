// Top-level build file where you can add configuration options common to all sub-projects/modules.

// NDK 27.0.12077973 (preferred by RN 0.83) is not installed; use the installed NDK 29 instead.
ext.ndkVersion = "29.0.14206865"
// Build Tools 35.0.0 (expo plugin fallback) is corrupted; use installed 36.0.0 instead.
ext.buildToolsVersion = "36.0.0"

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
    classpath('expo.modules:publish')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "expo-brownfield-publish"
apply plugin: "com.facebook.react.rootproject"

expoBrownfieldPublishPlugin {
  libraryName = "brownfield"
  publications {
    localDefault {
        type.set("localMaven")
    }
  }
}